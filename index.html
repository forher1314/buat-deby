<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kado Spesial Untukmu</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fae1dd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .card {
            position: relative;
            width: 300px;
            height: 400px;
            background-color: #f08080;
            border-radius: 10px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.8s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-front {
            background-color: #ff9999;
            color: white;
        }

        .card-back {
            background-color: white;
            color: #333;
            transform: rotateY(180deg);
        }

        h1 { margin: 0; font-size: 24px; }
        p { font-size: 16px; line-height: 1.5; }
        .heart { color: #e63946; font-size: 50px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-front">
            <div class="heart">❤️</div>
            <h1>Klik & Intip!</h1>
            <p>Ada sesuatu untukmu...</p>
        </div>
        <div class="card-back">
            <h1>Selamat! 🎉</h1>
            <p>Semoga hari-harimu selalu menyenangkan dan penuh inspirasi. Terima kasih sudah menjadi orang yang luar biasa!</p>
            <p><strong>- Dari Teman Kodingmu -</strong></p>
        </div>
    </div>

</body>
</html>
